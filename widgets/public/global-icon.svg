<svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="24" height="24" rx="4" fill="#1a1a1a"/>
  <g fill="#ffffff" opacity="0.9">
    <!-- Grid pattern representing global/network connectivity -->
    <circle cx="6" cy="6" r="1.5"/>
    <circle cx="12" cy="6" r="1.5"/>
    <circle cx="18" cy="6" r="1.5"/>
    <circle cx="6" cy="12" r="1.5"/>
    <circle cx="12" cy="12" r="1.5"/>
    <circle cx="18" cy="12" r="1.5"/>
    <circle cx="6" cy="18" r="1.5"/>
    <circle cx="12" cy="18" r="1.5"/>
    <circle cx="18" cy="18" r="1.5"/>
    
    <!-- Connection lines -->
    <line x1="6" y1="6" x2="12" y2="6" stroke="#ffffff" stroke-width="0.5" opacity="0.6"/>
    <line x1="12" y1="6" x2="18" y2="6" stroke="#ffffff" stroke-width="0.5" opacity="0.6"/>
    <line x1="6" y1="12" x2="12" y2="12" stroke="#ffffff" stroke-width="0.5" opacity="0.6"/>
    <line x1="12" y1="12" x2="18" y2="12" stroke="#ffffff" stroke-width="0.5" opacity="0.6"/>
    <line x1="6" y1="18" x2="12" y2="18" stroke="#ffffff" stroke-width="0.5" opacity="0.6"/>
    <line x1="12" y1="18" x2="18" y2="18" stroke="#ffffff" stroke-width="0.5" opacity="0.6"/>
    
    <line x1="6" y1="6" x2="6" y2="12" stroke="#ffffff" stroke-width="0.5" opacity="0.6"/>
    <line x1="6" y1="12" x2="6" y2="18" stroke="#ffffff" stroke-width="0.5" opacity="0.6"/>
    <line x1="12" y1="6" x2="12" y2="12" stroke="#ffffff" stroke-width="0.5" opacity="0.6"/>
    <line x1="12" y1="12" x2="12" y2="18" stroke="#ffffff" stroke-width="0.5" opacity="0.6"/>
    <line x1="18" y1="6" x2="18" y2="12" stroke="#ffffff" stroke-width="0.5" opacity="0.6"/>
    <line x1="18" y1="12" x2="18" y2="18" stroke="#ffffff" stroke-width="0.5" opacity="0.6"/>
  </g>
</svg>